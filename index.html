<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS Tracker - Sepeda Listrik</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
    .header { background: #16213e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f3460; }
    .header h1 { font-size: 16px; color: #00d4aa; }
    .status { font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
    .dot.online { background: #00d4aa; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .stats { background: #16213e; display: flex; gap: 1px; border-bottom: 1px solid #0f3460; }
    .stat { flex: 1; padding: 10px; text-align: center; background: #1a1a2e; }
    .stat-val { font-size: 20px; font-weight: bold; color: #00d4aa; }
    .stat-label { font-size: 10px; color: #888; margin-top: 2px; }
    #map { flex: 1; }
    .bottom-bar { background: #16213e; padding: 8px 16px; font-size: 11px; color: #666; display: flex; justify-content: space-between; border-top: 1px solid #0f3460; }
    #last-update { color: #00d4aa; }
  </style>
</head>
<body>

<div class="header">
  <h1>⚡ GPS Tracker - Sepeda Listrik</h1>
  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Memuat...</span>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-val" id="val-speed">--</div>
    <div class="stat-label">km/h</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="val-alt">--</div>
    <div class="stat-label">Altitude (m)</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="val-sat">--</div>
    <div class="stat-label">Satelit</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="val-points">--</div>
    <div class="stat-label">Titik Rute</div>
  </div>
</div>

<div id="map"></div>

<div class="bottom-bar">
  <span>Update tiap 5 detik</span>
  <span>Terakhir update: <span id="last-update">--</span></span>
</div>

<script>
  // URL CSV publish langsung dari Google Sheets
  var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFc2B6hdI-JWW4g1KyoCVRxX2Wg_dg0YOUw3iZi6YC-y0cyYEhW1Gg8XPhU3onofDCPGfacTfXcuW7/pub?gid=0&single=true&output=csv";
  var MAPS_API_KEY = "AIzaSyB6euT0wugdYdU2hsRASv7RXNgdfoM7ndk";

  var map, marker, polyline, infoWindow;
  var rute = [];
  var lastLat = 0, lastLng = 0;
  var lastTimestamp = "";

  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: -6.4, lng: 106.8 },
      zoom: 16,
      mapTypeId: "roadmap",
      styles: [
        { elementType: "geometry", stylers: [{ color: "#212121" }] },
        { elementType: "labels.text.fill", stylers: [{ color: "#757575" }] },
        { elementType: "labels.text.stroke", stylers: [{ color: "#212121" }] },
        { featureType: "road", elementType: "geometry", stylers: [{ color: "#373737" }] },
        { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#8a8a8a" }] },
        { featureType: "water", elementType: "geometry", stylers: [{ color: "#000000" }] }
      ]
    });

    marker = new google.maps.Marker({
      map: map,
      title: "Posisi Sekarang",
      icon: {
        path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
        scale: 6,
        fillColor: "#00d4aa",
        fillOpacity: 1,
        strokeColor: "#fff",
        strokeWeight: 1.5
      }
    });

    polyline = new google.maps.Polyline({
      map: map,
      strokeColor: "#00d4aa",
      strokeOpacity: 0.8,
      strokeWeight: 3
    });

    infoWindow = new google.maps.InfoWindow();
    marker.addListener("click", function() {
      infoWindow.setContent(
        "<div style='color:#000;font-size:13px'>" +
        "<b>Posisi Terkini</b><br>" +
        "Lat: " + lastLat.toFixed(6) + "<br>" +
        "Lng: " + lastLng.toFixed(6) +
        "</div>"
      );
      infoWindow.open(map, marker);
    });

    ambilData();
    setInterval(ambilData, 5000);
  }

  // Parse satu baris CSV dengan benar (handle koma dalam tanda kutip)
  function parseCSVLine(line) {
    var result = [];
    var current = "";
    var inQuotes = false;
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') {
        inQuotes = !inQuotes;
      } else if (c === ',' && !inQuotes) {
        result.push(current.trim());
        current = "";
      } else {
        current += c;
      }
    }
    result.push(current.trim());
    return result;
  }

  function ambilData() {
    // Tambah timestamp di URL untuk bypass cache browser
    var url = CSV_URL + "&t=" + Date.now();

    fetch(url, { cache: "no-store" })
      .then(function(r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(function(csv) {
        var baris = csv.trim().split("\n");

        // Minimal harus ada header + 1 baris data
        if (baris.length < 2) {
          updateStatus(false, "Belum ada data GPS");
          return;
        }

        // Ambil baris terakhir yang valid (mundur dari bawah)
        var last = null;
        for (var i = baris.length - 1; i >= 1; i--) {
          var cols = parseCSVLine(baris[i]);
          // Kolom: Timestamp, Lat, Lng, Speed, Alt, Sat, MapsLink
          if (cols.length >= 3) {
            var testLat = parseFloat(cols[1]);
            var testLng = parseFloat(cols[2]);
            if (!isNaN(testLat) && !isNaN(testLng) && testLat !== 0 && testLng !== 0) {
              last = cols;
              break;
            }
          }
        }

        if (!last) {
          updateStatus(false, "Data koordinat tidak valid");
          return;
        }

        var timestamp = last[0] || "--";
        var lat   = parseFloat(last[1]);
        var lng   = parseFloat(last[2]);
        var speed = parseFloat(last[3]) || 0;
        var alt   = parseFloat(last[4]) || 0;
        var sat   = parseInt(last[5])   || 0;

        // Cek apakah data benar-benar baru (timestamp berbeda)
        var isNewData = (timestamp !== lastTimestamp);
        lastTimestamp = timestamp;

        // Update marker
        var pos = { lat: lat, lng: lng };
        marker.setPosition(pos);
        map.panTo(pos);

        // Tambah titik rute hanya jika posisi berubah
        if (Math.abs(lat - lastLat) > 0.000005 || Math.abs(lng - lastLng) > 0.000005) {
          rute.push(pos);
          polyline.setPath(rute);
          lastLat = lat;
          lastLng = lng;
        }

        // Update stats
        document.getElementById("val-speed").textContent  = speed.toFixed(1);
        document.getElementById("val-alt").textContent    = alt.toFixed(0);
        document.getElementById("val-sat").textContent    = sat;
        document.getElementById("val-points").textContent = rute.length;
        document.getElementById("last-update").textContent = timestamp;

        updateStatus(true, isNewData ? "Live" : "Live (menunggu data baru)");
      })
      .catch(function(err) {
        updateStatus(false, "Error: " + err.message);
      });
  }

  function updateStatus(online, text) {
    document.getElementById("status-dot").className = "dot" + (online ? " online" : "");
    document.getElementById("status-text").textContent = text;
  }
</script>

<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB6euT0wugdYdU2hsRASv7RXNgdfoM7ndk&callback=initMap">
</script>

</body>
</html>
